<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ── 1. VIEWPORT ───────────────────────────────────────────────────
         width=device-width  → never wider than the screen
         initial-scale=1     → no default zoom
         viewport-fit=cover  → content reaches behind notch / Dynamic Island
         user-scalable=no    → disable pinch-zoom (app-like feel)
    ──────────────────────────────────────────────────────────────────── -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1,
                   user-scalable=no, viewport-fit=cover" />

    <!-- ── 2. PWA / iOS ──────────────────────────────────────────────────
         apple-mobile-web-app-capable   → hides Safari chrome in standalone
         status-bar-style black-translucent → status bar overlays the app
                                             so env(safe-area-inset-top) works
         apple-mobile-web-app-title     → name shown under the home screen icon
    ──────────────────────────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Park Now" />

    <!-- Android Chrome PWA support -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme colour (Android Chrome toolbar + task-switcher) -->
    <meta name="theme-color" content="#0056D2" />

    <!-- ── 3. ICONS ──────────────────────────────────────────────────────
         Apple requires a dedicated apple-touch-icon link.
         Use logo192.png (192×192) — iOS will scale it as needed.
    ──────────────────────────────────────────────────────────────────── -->
    <link rel="icon"             href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <meta name="description" content="Park Now — Find a parking spot in 30 seconds." />

    <title>Park Now</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
